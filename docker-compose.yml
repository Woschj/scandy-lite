services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scandy
      POSTGRES_PASSWORD: scandy
      POSTGRES_DB: scandy_lite
    ports:
      - "5432:5432"
    volumes:
      - scandy_lite_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scandy -d scandy_lite"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  scandy_lite_db_data:
