# Optionales Overlay für Docker/Swarm-Secrets - für den normalen Portainer-
# Einzelserver-Betrieb NICHT nötig (dafür reichen die gewöhnlichen
# Umgebungsvariablen in compose.yaml völlig aus, siehe INSTALL.md).
#
# Relevant, wenn:
#   - ihr Docker Swarm nutzt (echte Secrets, verschlüsselt im Raft-Log,
#     nie als Klartext-Env-Var in `docker inspect` sichtbar), oder
#   - ihr aus anderen Gründen sensible Werte lieber als Datei statt als
#     Umgebungsvariable an den Container übergeben wollt (z.B. weil ein
#     Secrets-Manager wie Vault/Bitwarden schon Dateien ausliefert).
#
# Nutzung:
#   1. Secret-Dateien anlegen (siehe secrets/ - Beispiel-Ordner, echte Werte
#      NICHT ins Git-Repo committen, secrets/*.txt ist in .gitignore)
#   2. docker compose -f compose.yaml -f compose.secrets.yaml up -d
#
# docker/entrypoint.sh löst *_FILE-Variablen automatisch auf (siehe dort) -
# der Rest der App merkt nichts vom Unterschied, DATABASE_URL/SECRET_KEY
# kommen am Ende genauso bei app.core.config.Settings an wie bei der
# gewöhnlichen Umgebungsvariablen-Variante.

services:
  app:
    environment:
      # Werden vom entrypoint.sh aufgelöst (siehe resolve_secret()) - die
      # "normalen" SECRET_KEY/POSTGRES_PASSWORD/ADMIN_PASSWORD-Variablen aus
      # compose.yaml können hier leer bleiben, ihre *_FILE-Variante gewinnt.
      SECRET_KEY_FILE: /run/secrets/scandy_secret_key
      POSTGRES_PASSWORD_FILE: /run/secrets/scandy_postgres_password
      ADMIN_PASSWORD_FILE: /run/secrets/scandy_admin_password
    secrets:
      - scandy_secret_key
      - scandy_postgres_password
      - scandy_admin_password

  db:
    environment:
      # Postgres selbst unterstützt dieselbe *_FILE-Konvention nativ
      # (offizielles Postgres-Image, nicht scandy-lite-spezifisch).
      POSTGRES_PASSWORD_FILE: /run/secrets/scandy_postgres_password
    secrets:
      - scandy_postgres_password

secrets:
  scandy_secret_key:
    file: ./secrets/secret_key.txt
  scandy_postgres_password:
    file: ./secrets/postgres_password.txt
  scandy_admin_password:
    file: ./secrets/admin_password.txt
