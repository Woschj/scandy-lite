<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}Scandy-Lite{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#1b5e5a">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml">

  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
  <script src="/static/js/form-guard.js" defer></script>
  <script src="/static/js/qty-stepper.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}
  <div class="app-shell">
    {% include "partials/nav.html" %}
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
    {% include "partials/tabbar.html" %}
  </div>
  {% endblock %}
</body>
</html>
