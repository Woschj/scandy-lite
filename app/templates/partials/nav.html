<header class="topnav">
  <a href="/" class="wordmark">SCANDY<span class="dot">//</span>LITE</a>

  <nav class="topnav-links">
    <a href="/" class="active">Übersicht</a>
    {# Werkzeuge / Verbrauchsmaterial / Historie kommen in Phase 3-5 dazu #}
  </nav>

  <div class="user-chip">
    {% if user %}
      {% if all_departments %}
        <form method="get" action="/" style="margin:0;">
          <select name="department" onchange="this.form.submit()" aria-label="Abteilung wechseln"
                  style="font-family:var(--font-display); font-size:0.75rem; padding:0.375rem 0.5rem; border-radius:6px; border:1px solid var(--line-strong); background:#fff;">
            <option value="">Alle Abteilungen</option>
            {% for d in all_departments %}
              <option value="{{ d.code }}" {% if department and d.id == department.id %}selected{% endif %}>{{ d.name }}</option>
            {% endfor %}
          </select>
        </form>
      {% elif department %}
        <span class="eyebrow">{{ department.name }}</span>
      {% endif %}
      <span>{{ user.username }}</span>
      <a href="/auth/logout" class="btn btn-ghost" style="min-height:36px; padding:0.375rem 0.75rem;">Abmelden</a>
    {% endif %}
  </div>
</header>
