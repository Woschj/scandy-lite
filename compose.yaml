services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scandy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_immediately}
      POSTGRES_DB: ${POSTGRES_DB:-scandy_lite}
    ports:
      # Nur für den Migrationstest vom Host aus - auf 127.0.0.1 gebunden
      # (nicht 0.0.0.0), damit die DB nicht versehentlich im ganzen Netz
      # erreichbar wird. Nach dem Testen der Migration wieder entfernen.
      - "127.0.0.1:5432:5432"
    volumes:
      - scandy_lite_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scandy} -d ${POSTGRES_DB:-scandy_lite}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Kein Port-Publish nach außen - nur der App-Container braucht Zugriff.
    # Für Wartung: über Portainer-Konsole in den db-Container exec'en (psql).

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENV: production
      APP_NAME: Scandy-Lite
      SECRET_KEY: ${SECRET_KEY:-change_me_secret_key}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scandy}:${POSTGRES_PASSWORD:-change_me_immediately}@db:5432/${POSTGRES_DB:-scandy_lite}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-scandy}:${POSTGRES_PASSWORD:-change_me_immediately}@db:5432/${POSTGRES_DB:-scandy_lite}
      # Nur für den Fall, dass DATABASE_URL(_SYNC) vom entrypoint.sh neu
      # zusammengesetzt werden muss (siehe compose.secrets.yaml) - werden
      # sonst nirgends direkt ausgewertet, DATABASE_URL(_SYNC) oben bleibt
      # die eigentliche Quelle der Wahrheit für die App selbst.
      POSTGRES_USER: ${POSTGRES_USER:-scandy}
      POSTGRES_DB: ${POSTGRES_DB:-scandy_lite}
      POSTGRES_HOST: db
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      # Nur auf "true" setzen, wenn ein Reverse-Proxy davor TLS terminiert
      # (sonst verwirft der Browser das Login-Cookie über HTTP stillschweigend).
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      # Optional: wird beim ersten Start automatisch angelegt, wenn beide Werte gesetzt sind.
      # Danach in Portainer wieder entfernen/leeren - das Skript ist zwar idempotent
      # (überschreibt kein bestehendes Passwort), aber das Secret muss nicht dauerhaft
      # als Klartext-Env-Var im Stack stehen bleiben.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DEFAULT_DEPARTMENT_CODE: ${DEFAULT_DEPARTMENT_CODE:-werkstatt}
      DEFAULT_DEPARTMENT_NAME: ${DEFAULT_DEPARTMENT_NAME:-Werkstatt}
      # Optional: SSO via OpenID Connect (z.B. Authentik) - alle drei leer
      # lassen, um das Feature auszuschalten (Login-Seite zeigt dann nur das
      # lokale Formular). Erster Login legt automatisch ein Konto an, aber
      # gesperrt, bis ein Admin es unter "Ausstehende Konten" freischaltet.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-SSO}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - scandy_lite_uploads:/app/uploads

  # Optional: HTTPS-Reverse-Proxy mit selbstsigniertem Zertifikat.
  # Nötig für Kamera-basiertes Scannen (Browser verweigern Kamerazugriff
  # über reines HTTP, außer auf localhost). Läuft parallel zum direkten
  # HTTP-Zugriff über APP_PORT - beides bleibt nutzbar.
  # Bei Nichtgebrauch: diesen Service + den caddy_data-Volume-Eintrag
  # unten einfach aus der Stack-Konfiguration entfernen.
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "${APP_HTTPS_PORT:-8443}:8443"
    volumes:
      - caddy_data:/data

volumes:
  scandy_lite_db_data:
  scandy_lite_uploads:
  caddy_data:
